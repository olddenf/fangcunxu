<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方寸序 - 画廊页面预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
    <style>
        body {
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
        }
        .phone-container {
            width: 375px;
            height: 812px;
            background-color: #000000;
            border-radius: 40px;
            border: 10px solid #1a1a1a;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        .dynamic-island {
            width: 128px;
            height: 32px;
            background-color: #000000;
            border-radius: 16px;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 16px;
            font-size: 12px;
        }
        .signal-icons {
            display: flex;
            gap: 8px;
        }
        .brand-section {
            text-align: center;
            padding: 32px 0 48px 0;
        }
        .brand-title {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }
        .brand-subtitle {
            font-size: 17px;
            color: #888888;
            letter-spacing: 0.01em;
            margin-bottom: 20px;
        }
        .brand-date {
            font-size: 14px;
            color: #666666;
            font-style: italic;
        }
        .core-button-section {
            text-align: center;
            margin-bottom: 48px;
        }
        .feature-cards {
            margin-bottom: 96px;
            padding: 0 8px;
        }
        .feature-card {
            background-color: #1a1a1a;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
        }
        .feature-icon {
            width: 48px;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 16px;
        }
        .feature-content {
            flex: 1;
        }
        .feature-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .feature-description {
            font-size: 12px;
            color: #888888;
        }
        .bottom-navigation {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding-bottom: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }
        .nav-label {
            font-size: 10px;
        }
        .home-indicator {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 128px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        .red-primary {
            color: #ff0000;
        }
        .text-tertiary {
            color: #888888;
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">
    <div class="phone-container">
        <!-- 灵动岛 -->
        <div class="dynamic-island"></div>
        

        
        <!-- 内容区域 -->
        <div class="scrollable-content">
            <!-- 品牌区 -->
            <div class="brand-section">
                <div class="brand-title">方寸序</div>
                <div class="brand-subtitle">Fang Cun Xu</div>
                <div class="brand-date">2026.03.24 · 立方寸，序万物</div>
            </div>
            
            <!-- 核心按钮区 -->
            <div class="core-button-section">
                <img src="android/app/src/main/res/drawable/logo_transparent.png" alt="Logo" class="w-24 h-24 mx-auto active:scale-95 transition-transform duration-200" />
                <div class="text-red-primary mt-3 italic">开启创作</div>
            </div>
            
            <!-- 功能卡片区 -->
            <div class="feature-cards">
                <!-- 影调实验室 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <iconify-icon class="text-red-primary text-2xl" icon="ph:image-square-bold"></iconify-icon>
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">影调实验室</div>
                        <div class="feature-description">AI 自动同步 12 组电影级调色预设</div>
                    </div>
                    <iconify-icon class="text-text-tertiary" icon="ph:caret-right-bold"></iconify-icon>
                </div>
                
                <!-- 构图指南 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <iconify-icon class="text-red-primary text-2xl" icon="ph:bounding-box-bold"></iconify-icon>
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">构图指南</div>
                        <div class="feature-description">查看 24 种经典摄影布局拆解</div>
                    </div>
                    <iconify-icon class="text-text-tertiary" icon="ph:caret-right-bold"></iconify-icon>
                </div>
                
                <!-- 方寸剪影 -->
                <div class="feature-card">
                    <div class="feature-icon">
                        <iconify-icon class="text-red-primary text-2xl" icon="ph:clock-counter-clockwise-bold"></iconify-icon>
                    </div>
                    <div class="feature-content">
                        <div class="feature-title">方寸剪影</div>
                        <div class="feature-description">回顾上周你捕捉的 8 个精彩时刻</div>
                    </div>
                    <div class="bg-white/10 px-2 py-1 rounded text-xs text-text-tertiary">8+</div>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="bottom-navigation">
            <!-- 画卷 -->
            <div class="nav-item">
                <div class="nav-icon red-primary">
                    <iconify-icon class="text-2xl" icon="ph:house-fill"></iconify-icon>
                </div>
                <div class="nav-label red-primary">画卷</div>
            </div>
            
            <!-- 瞬境 -->
            <div class="nav-item">
                <div class="nav-icon text-text-tertiary">
                    <iconify-icon class="text-2xl" icon="ph:aperture-bold"></iconify-icon>
                </div>
                <div class="nav-label text-text-tertiary">瞬境</div>
            </div>
            
            <!-- 规序 -->
            <div class="nav-item">
                <div class="nav-icon text-text-tertiary">
                    <iconify-icon class="text-2xl" icon="ph:gear-six-bold"></iconify-icon>
                </div>
                <div class="nav-label text-text-tertiary">规序</div>
            </div>
        </div>
        
        <!-- 底部 Home Indicator -->
        <div class="home-indicator"></div>
    </div>
</body>
</html>
